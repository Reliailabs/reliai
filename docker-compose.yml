services:
  postgres:
    image: postgres:16-alpine
    container_name: reliai-postgres
    environment:
      POSTGRES_DB: reliai
      POSTGRES_USER: reliai
      POSTGRES_PASSWORD: reliai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: reliai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: reliai-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://reliai:reliai@postgres:5432/reliai
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: reliai-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://reliai:reliai@postgres:5432/reliai
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "app.scripts.rq_worker"]
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: reliai-web
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
