name: Operator Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  operator-smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      REDIS_URL: redis://127.0.0.1:6379/0
      API_KEY_HASH_SECRET: test-secret
      AUTH_SESSION_HASH_SECRET: test-session-secret
      PYTHONPATH: ${{ github.workspace }}/apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Run operator smoke test
        run: python -m pytest apps/api/tests/test_operator_flow.py
