name: QA

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  qa:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reliai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d reliai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/reliai
      TEST_DATABASE_ADMIN_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/postgres
      REDIS_URL: redis://127.0.0.1:6379/0
      API_KEY_HASH_SECRET: test-secret
      AUTH_SESSION_HASH_SECRET: test-session-secret
      PYTHONPATH: ${{ github.workspace }}/apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Python dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run backend tests
        run: python -m pytest apps/api/tests

      - name: Run backend lint
        run: python -m ruff check apps/api

      - name: Run migrations
        working-directory: apps/api
        run: python -m alembic -c alembic.ini upgrade head

      - name: Run frontend build
        run: pnpm --filter web build

      - name: Run frontend lint
        run: pnpm --filter web lint

      - name: Run layout audit
        run: pnpm layout:audit

      - name: Run visual regression tests
        run: pnpm test:visual

      - name: Run screenshot audit
        run: pnpm audit:screenshots
