[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reliai"
version = "0.1.0"
description = "Observability and reliability tooling for AI systems"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Reliai Labs" }]
requires-python = ">=3.9"
dependencies = []
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://github.com/reliai/reliai-python"
Repository = "https://github.com/reliai/reliai-python"
"Bug Tracker" = "https://github.com/reliai/reliai-python/issues"

[project.scripts]
reliai-run = "reliai.cli.run:main"

[tool.hatch.build.targets.wheel]
include = ["reliai/", "sitecustomize.py"]
