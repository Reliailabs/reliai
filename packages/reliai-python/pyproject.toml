[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "reliai"
version = "0.1.0"
description = "Reliai Python SDK"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
reliai-run = "reliai.cli.run:main"

[tool.setuptools]
package-dir = {"" = "."}
py-modules = ["sitecustomize"]

[tool.setuptools.packages.find]
where = ["."]
